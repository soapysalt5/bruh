<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>

  <!-- Auto redirect after 5 seconds -->
  <meta http-equiv="refresh" content="5;url=https://admin-marty-games.replit.app" />

  <style>
    :root {
      --bg1: #0f2027;
      --bg2: #203a43;
      --bg3: #2c5364;
      --accent: #4fc3f7;
      --text: #eaf6ff;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color: var(--text);
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 2.5rem 3rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      animation: fadeIn 0.8s ease-out;
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
      letter-spacing: 0.5px;
    }

    p {
      opacity: 0.9;
      line-height: 1.6;
    }

    .spinner {
      margin: 2rem auto 1.5rem;
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .countdown {
      font-weight: 600;
      color: var(--accent);
    }

    a.button {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      background: var(--accent);
      color: #002b3a;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    a.button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79, 195, 247, 0.45);
      opacity: 0.95;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redirecting you…</h1>
    <p>You’ll be taken to the new page in <span class="countdown" id="seconds">5</span> seconds.</p>

    <div class="spinner"></div>

    <p>If nothing happens, click the button below.</p>
    <a class="button" href="https://admin-marty-games.replit.app">Go now</a>
  </div>

  <script>
    const targetUrl = "https://admin-marty-games.replit.app";
    let seconds = 5;
    const el = document.getElementById("seconds");

    const timer = setInterval(() => {
      seconds--;
      el.textContent = seconds;

      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = targetUrl;
      }
    }, 1000);
  </script>
</body>
</html>
