<!DOCTYPE html>
<html lang="en-us">

<head>
  <base href="https://raw.githack.com/marty-games/mga-unity/main/five-nights-at-epsteins/">
  <meta charset="utf-8">
  <title>Five Nights at Epstein's</title>

  <style>
    /* background canvas */

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: -2;
    }

    /* page layout */

    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* loader */

    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      z-index: 2;
    }

    #title {
      font-size: 3em;
      font-weight: bold;
      text-align: center;
      text-shadow:
        0 0 5px #0ff,
        0 0 10px #0ff,
        0 0 20px #0ff,
        0 0 30px #0ff;
    }

    /* progress bar */

    #progress-bar {
      width: 420px;
      height: 12px;
      background: #111;
      border-radius: 10px;
      overflow: visible;
      box-shadow: 0 0 3px #0ff, 0 0 8px rgba(0, 255, 255, .4);
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: #0ff;
      border-radius: 10px;
      box-shadow: 0 0 4px #0ff, 0 0 10px rgba(0, 255, 255, .6);
      transition: width .25s;
    }

    #loading-text {
      font-size: 18px;
      text-shadow: 0 0 4px #fff, 0 0 8px #fff;
    }

    /* unity canvas */

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      background: black;
    }
  </style>
</head>

<body>

  <canvas id="bg-canvas"></canvas>

  <div id="loader">
    <div id="title">Five Nights at Epstein's</div>

    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>

    <div id="loading-text">Preparing files...</div>
  </div>

  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
  </div>

  <script>

    /* background particles */

    const canvasBG = document.getElementById("bg-canvas");
    const ctx = canvasBG.getContext("2d");

    const MAX_PARTICLES = 50;
    const MAX_DISTANCE = 100;

    const COLORS = ['#0ff', '#ff0', '#f0f', '#0f0', '#f0ff'];

    let particles = [];
    let animationId;

    function initBackground() {
      canvasBG.width = window.innerWidth;
      canvasBG.height = window.innerHeight;

      particles = [];

      for (let i = 0; i < MAX_PARTICLES; i++) {
        particles.push({
          x: Math.random() * canvasBG.width,
          y: Math.random() * canvasBG.height,
          size: Math.random() * 3 + 1,
          speedX: (Math.random() - 0.5) * 1.2,
          speedY: (Math.random() - 0.5) * 1.2,
          color: COLORS[Math.floor(Math.random() * COLORS.length)]
        });
      }
    }

    function drawConnections() {
      for (let a = 0; a < particles.length; a++) {
        for (let b = a + 1; b < particles.length; b++) {

          const dx = particles[a].x - particles[b].x;
          const dy = particles[a].y - particles[b].y;

          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < MAX_DISTANCE) {
            ctx.beginPath();
            ctx.strokeStyle =
              `rgba(0,255,255,${0.5 - distance / (2 * MAX_DISTANCE)})`;

            ctx.lineWidth = 1;

            ctx.moveTo(particles[a].x, particles[a].y);
            ctx.lineTo(particles[b].x, particles[b].y);

            ctx.stroke();
          }
        }
      }
    }

    function animateBackground() {

      ctx.clearRect(0, 0, canvasBG.width, canvasBG.height);

      particles.forEach(p => {

        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0 || p.x > canvasBG.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvasBG.height) p.speedY *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;

        ctx.fill();
      });

      drawConnections();

      animationId = requestAnimationFrame(animateBackground);
    }

    window.addEventListener("resize", initBackground);

    initBackground();
    animateBackground();


    /* unity loader */

    const loadingText = document.querySelector("#loading-text");
    const progressFill = document.querySelector("#progress-fill");

    const TOTAL_MB = 155.84;

    let loadedBytes = 0;

    async function fetchWithProgress(url) {

      const response = await fetch(url);
      const reader = response.body.getReader();

      let chunks = [];
      let received = 0;

      while (true) {

        const { done, value } = await reader.read();
        if (done) break;

        received += value.length;
        loadedBytes += value.length;

        chunks.push(value);

        const mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        const percent = Math.min((mbDone / TOTAL_MB) * 100, 100);

        progressFill.style.width = percent + "%";

        loadingText.textContent =
          `Loading ${mbDone} MB / ${TOTAL_MB} MB (${percent.toFixed(0)}%)`;
      }

      const fullBuffer = new Uint8Array(received);

      let offset = 0;

      for (const chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
      }

      return fullBuffer.buffer;
    }

    function getParts(file, start, end) {

      const parts = [];

      for (let i = start; i <= end; i++) {
        parts.push(`${file}.part${i}`);
      }

      return parts;
    }

    async function mergeFiles(parts) {

      const buffers =
        await Promise.all(parts.map(p => fetchWithProgress(p)));

      return URL.createObjectURL(new Blob(buffers));
    }


    /* unity start */

    (async () => {

      const [dataUrl, wasmUrl, webm] = await Promise.all([

        mergeFiles(getParts("Build/fnae.data", 1, 3)),
        mergeFiles(getParts("Build/fnae.wasm", 1, 3)),
        mergeFiles(getParts("StreamingAssets/202512191935.webm", 1, 3))

      ]);

      window.randomwebm = webm;

      const canvas = document.querySelector("#unity-canvas");

      const config = {
        arguments: [],
        dataUrl,
        frameworkUrl: "Build/fnae.framework.js",
        codeUrl: wasmUrl,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Evan Productions",
        productName: "Five Nights at Epstein's",
        productVersion: "1.0"
      };

      const loaderScript = document.createElement("script");

      loaderScript.src = "Build/fnae.loader.js";

      loaderScript.onload = () => {

        createUnityInstance(canvas, config, progress => {
          progressFill.style.width = (progress * 100) + "%";
        }).then(() => {

          document.getElementById("loader").style.display = "none";

          cancelAnimationFrame(animationId);
          document.getElementById("bg-canvas").style.display = "none";

          document.getElementById("unity-container").style.display = "block";

        });
      };

      document.body.appendChild(loaderScript);

    })();

  </script>

</body>
</html>
