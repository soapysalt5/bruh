<!DOCTYPE html>
<html lang="en-us">

<head>

    <base href="https://raw.githack.com/marty-games/mga-unity/main/flying-gorilla/">

    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <title>Flying Gorilla</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: black;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* particle background */

        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        /* loader */

        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            z-index: 2;
        }

        #title {
            font-size: 3em;
            font-weight: bold;
            text-shadow:
                0 0 5px #0ff,
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 30px #0ff;
        }

        /* progress bar */

        #progress-bar {
            width: 420px;
            height: 12px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 3px #0ff, 0 0 8px rgba(0, 255, 255, .4);
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: #0ff;
            border-radius: 10px;
            box-shadow: 0 0 4px #0ff, 0 0 10px rgba(0, 255, 255, .6);
            transition: width .25s;
        }

        #loading-text {
            font-size: 18px;
            text-shadow: 0 0 4px #fff, 0 0 8px #fff;
        }

        /* unity */

        #unity-container {
            position: fixed;
            inset: 0;
            display: none;
            width: 100%;
            height: 100%;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            background: black;
        }

        #unity-warning {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        #unity-footer {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 20px;
        }
    </style>

</head>

<body>

    <canvas id="bg-canvas"></canvas>

    <div id="loader">

        <div id="title">Flying Gorilla</div>

        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>

        <div id="loading-text">Preparing game...</div>

    </div>

    <div id="unity-container">

        <canvas id="unity-canvas"></canvas>

        <div id="unity-warning"></div>

        <div id="unity-footer">

            <button id="unity-fullscreen-button">Fullscreen</button>

        </div>

    </div>

    <script>
        /* PARTICLE BACKGROUND */

        const canvasBG = document.getElementById("bg-canvas");
        const ctx = canvasBG.getContext("2d");

        const MAX_PARTICLES = 50;
        const MAX_DISTANCE = 100;

        const COLORS = [
            "#00ffff",
            "#ff00ff",
            "#ffff00",
            "#00ff00",
            "#ff0080"
        ];

        let particles = [];
        let animationId;

        function initBackground() {

            canvasBG.width = window.innerWidth;
            canvasBG.height = window.innerHeight;

            particles = [];

            for (let i = 0; i < MAX_PARTICLES; i++) {

                particles.push({

                    x: Math.random() * canvasBG.width,
                    y: Math.random() * canvasBG.height,
                    size: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 1.2,
                    speedY: (Math.random() - 0.5) * 1.2,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)]

                });

            }

        }

        function drawConnections() {

            for (let a = 0; a < particles.length; a++) {

                for (let b = a + 1; b < particles.length; b++) {

                    const dx = particles[a].x - particles[b].x;
                    const dy = particles[a].y - particles[b].y;

                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < MAX_DISTANCE) {

                        ctx.beginPath();

                        const color = particles[a].color;

                        ctx.strokeStyle = color;
                        ctx.globalAlpha = 0.5 - distance / (2 * MAX_DISTANCE);

                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);

                        ctx.shadowBlur = 10;
                        ctx.shadowColor = color;

                        ctx.stroke();

                        ctx.globalAlpha = 1;

                    }

                }

            }

        }

        function animateBackground() {

            ctx.clearRect(0, 0, canvasBG.width, canvasBG.height);

            particles.forEach(p => {

                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x < 0 || p.x > canvasBG.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvasBG.height) p.speedY *= -1;

                ctx.beginPath();

                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 8;

                ctx.fill();

            });

            drawConnections();

            animationId = requestAnimationFrame(animateBackground);

        }

        window.addEventListener("resize", initBackground);

        initBackground();
        animateBackground();

        /* UNITY */

        const progressFill = document.querySelector("#progress-fill");
        const loadingText = document.querySelector("#loading-text");

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var fullscreenButton = document.querySelector("#unity-fullscreen-button");
        var warningBanner = document.querySelector("#unity-warning");

        function unityShowBanner(msg, type) {

            var div = document.createElement("div");
            div.innerHTML = msg;
            warningBanner.appendChild(div);

            if (type == "error") {
                div.style = "background:red;padding:10px";
            } else {
                div.style = "background:yellow;padding:10px";
                setTimeout(() => {
                    div.remove()
                }, 5000);
            }

        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/vb.loader.js";

        var config = {
            dataUrl: buildUrl + "/vb.data",
            frameworkUrl: buildUrl + "/vb.framework.js",
            codeUrl: buildUrl + "/vb.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "flygorilla2-14",
            productVersion: "1.0",
            showBanner: unityShowBanner
        };

        loadingText.textContent = "Starting engine...";

        var script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {

            createUnityInstance(canvas, config, (progress) => {

                progressFill.style.width = (progress * 100) + "%";
                loadingText.textContent = "Loading " + Math.floor(progress * 100) + "%";

            }).then((unityInstance) => {

                document.getElementById("loader").style.display = "none";

                cancelAnimationFrame(animationId);
                canvasBG.style.display = "none";

                container.style.display = "block";

                fullscreenButton.onclick = () => {
                    unityInstance.SetFullscreen(1);
                };

            });

        };

        document.body.appendChild(script);
    </script>

</body>

</html>
