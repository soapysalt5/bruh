<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <base href="https://cdn.jsdelivr.net/gh/marty-games/mga-unity@main/gorilla-tag/">

    <title>Gorilla Tag Web</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: black;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* background canvas */

        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: black;
        }

        /* loader */

        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            z-index: 2;
        }

        #title {
            font-size: 3em;
            font-weight: bold;
            text-shadow:
                0 0 5px #0ff,
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 30px #0ff;
        }

        /* progress bar */

        #progress-bar {
            width: 420px;
            height: 12px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 3px #0ff, 0 0 8px rgba(0, 255, 255, .4);
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: #0ff;
            border-radius: 10px;
            box-shadow: 0 0 4px #0ff, 0 0 10px rgba(0, 255, 255, .6);
            transition: width .25s;
        }

        #loading-text {
            font-size: 18px;
            text-shadow: 0 0 4px #fff, 0 0 8px #fff;
        }

        /* unity */

        #unity-container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>

    <div id="loader">

        <div id="title">Gorilla Tag Web</div>

        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>

        <div id="loading-text">Preparing files...</div>

    </div>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        /* PARTICLE BACKGROUND */

        const canvasBG = document.getElementById("bg-canvas");
        const ctx = canvasBG.getContext("2d");

        const MAX_PARTICLES = 50;
        const MAX_DISTANCE = 100;

        const COLORS = [
            "#00ffff",
            "#ff00ff",
            "#ffff00",
            "#00ff00",
            "#ff0080"
        ];

        let particles = [];
        let animationId;

        function initBackground() {

            canvasBG.width = window.innerWidth;
            canvasBG.height = window.innerHeight;

            particles = [];

            for (let i = 0; i < MAX_PARTICLES; i++) {

                particles.push({

                    x: Math.random() * canvasBG.width,
                    y: Math.random() * canvasBG.height,
                    size: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 1.2,
                    speedY: (Math.random() - 0.5) * 1.2,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)]

                });

            }

        }

        function drawConnections() {

            for (let a = 0; a < particles.length; a++) {

                for (let b = a + 1; b < particles.length; b++) {

                    const dx = particles[a].x - particles[b].x;
                    const dy = particles[a].y - particles[b].y;

                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < MAX_DISTANCE) {

                        ctx.beginPath();

                        const color = particles[a].color;

                        ctx.strokeStyle = color;
                        ctx.globalAlpha = 0.5 - distance / (2 * MAX_DISTANCE);

                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);

                        ctx.shadowBlur = 10;
                        ctx.shadowColor = color;

                        ctx.stroke();

                        ctx.globalAlpha = 1;

                    }

                }

            }

        }

        function animateBackground() {

            ctx.clearRect(0, 0, canvasBG.width, canvasBG.height);

            particles.forEach(p => {

                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x < 0 || p.x > canvasBG.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvasBG.height) p.speedY *= -1;

                ctx.beginPath();

                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 8;

                ctx.fill();

            });

            drawConnections();

            animationId = requestAnimationFrame(animateBackground);

        }

        window.addEventListener("resize", initBackground);

        initBackground();
        animateBackground();

        /* LOADER */

        const loadingText = document.querySelector("#loading-text");
        const progressFill = document.querySelector("#progress-fill");

        let totalBytes = 0;
        let loadedBytes = 0;

        async function fetchWithProgress(url) {

            const response = await fetch(url);
            const reader = response.body.getReader();

            let chunks = [];
            let received = 0;

            while (true) {

                const {
                    done,
                    value
                } = await reader.read();
                if (done) break;

                received += value.length;
                loadedBytes += value.length;

                chunks.push(value);

                let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
                let mbTotal = "150.89";

                loadingText.textContent = `Loading ${mbDone} MB / ${mbTotal} MB`;

                let percent = (mbDone / mbTotal) * 100;

                progressFill.style.width = percent + "%";

            }

            let fullBuffer = new Uint8Array(received);

            let offset = 0;

            for (let chunk of chunks) {

                fullBuffer.set(chunk, offset);
                offset += chunk.length;

            }

            return fullBuffer.buffer;

        }

        async function mergeFiles(fileParts) {

            const buffers = await Promise.all(
                fileParts.map(part => fetchWithProgress(part))
            );

            return URL.createObjectURL(new Blob(buffers));

        }

        function getParts(file, start, end) {

            let parts = [];

            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }

            return parts;

        }

        /* UNITY START */

        (async () => {

            const [dataUrl] = await Promise.all([
                mergeFiles(getParts("Build/gtagwebR2.data.unityweb", 1, 8))
            ]);

            const buildUrl = "Build";

            const config = {
                dataUrl: dataUrl,
                frameworkUrl: buildUrl + "/gtagwebR2.framework.js.unityweb",
                codeUrl: buildUrl + "/gtagwebR2.wasm.unityweb",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "boolonx",
                productName: "Gorilla Tag Web",
                productVersion: "1.0",
            };

            const canvas = document.querySelector("#unity-canvas");

            const loaderScript = document.createElement("script");
            loaderScript.src = buildUrl + "/gtagwebR2.loader.js";

            loaderScript.onload = () => {

                createUnityInstance(canvas, config, (progress) => {

                    progressFill.style.width = (progress * 100) + "%";

                }).then(() => {

                    document.getElementById("loader").style.display = "none";

                    cancelAnimationFrame(animationId);
                    canvasBG.style.display = "none";

                    document.getElementById("unity-container").style.display = "block";

                });

            };

            document.body.appendChild(loaderScript);

        })();
    </script>

</body>

</html>
