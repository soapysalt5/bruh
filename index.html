<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Marty Games - Your #1 Free Game Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: -2;
        }

        body {
            margin: 0;
            font-family: Arial;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        .top-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            min-height: 100vh;
            text-align: center;
        }

        h2 {
            font-size: 3em;
            text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #0ff;
        }

        .search-container input {
            width: 320px;
            padding: 14px 18px;
            font-size: 16px;
            border-radius: 12px;
            border: 2px solid rgba(0, 255, 255, .4);
            background: rgba(0, 0, 0, .45);
            color: white;
            outline: none;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 8px rgba(0, 255, 255, .3);
        }

        .search-container input:focus {
            border-color: #0ff;
            box-shadow: 0 0 8px #0ff, 0 0 18px #0ff;
        }

        #game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, 160px);
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .game-card {
            display: none;
            text-align: center;
        }

        .game-card img {
            width: 160px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }

        .game-card a {
            color: #0ff;
            text-decoration: none;
        }

        .meta {
            font-size: 12px;
            color: #aaa;
        }

        footer {
            padding: 35px 0;
            display: flex;
            justify-content: center;
            gap: 80px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, .15);
            border-top: 1px solid rgba(0, 255, 255, .4);
            backdrop-filter: blur(3px);
        }

        .footer-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .footer-section a {
            color: #aaa;
            text-decoration: none;
        }

        .footer-section a:hover {
            color: white;
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>

    <main>
        <div class="top-bar">

            <h2>Marty Games</h2>
            <p>Coming soon.</p>

            <div class="search-container">
                <input id="gameSearch" type="text" placeholder="Search Marty Games..." onkeyup="searchGames()">
            </div>

            <div id="game-list"></div>

        </div>
    </main>

    <script>
        let gamesData = []

        fetch("games.json")
            .then(res => res.json())
            .then(data => {
                gamesData = data
                const container = document.getElementById("game-list")

                data.forEach(game => {
                    const card = document.createElement("div")
                    card.className = "game-card"

                    card.innerHTML = `
<a href="${game.url}">
<img src="${game.thumbnail}">
<br>
<strong>${game.name}</strong>
</a>
<div class="meta">
ID: ${game.id}<br>
Author: ${game.author}<br>
Engine: ${game.engine}
</div>
`
                    container.appendChild(card)
                })
            })

        function searchGames() {
            let input = document.getElementById("gameSearch").value.toLowerCase()
            let games = document.getElementsByClassName("game-card")

            for (let i = 0; i < games.length; i++) {
                let title = games[i].textContent.toLowerCase()
                if (input.length > 0 && title.includes(input)) {
                    games[i].style.display = "block"
                } else {
                    games[i].style.display = "none"
                }
            }
        }
    </script>

    <script>
        const canvas = document.getElementById("bg-canvas")
        const ctx = canvas.getContext("2d")

        let particles = []
        const MAX = 50
        const DIST = 100
        const COLORS = ['#0ff', '#ff0', '#f0f', '#0f0'] /* red removed */

        function init() {
            canvas.width = window.innerWidth
            canvas.height = window.innerHeight
            particles = []
            for (let i = 0; i < MAX; i++) particles.push(new Particle())
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width
                this.y = Math.random() * canvas.height
                this.size = Math.random() * 3 + 1
                this.vx = (Math.random() - .5) * 1.2
                this.vy = (Math.random() - .5) * 1.2
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)]
            }

            update() {
                this.x += this.vx
                this.y += this.vy
                if (this.x > canvas.width) this.x = 0
                if (this.x < 0) this.x = canvas.width
                if (this.y > canvas.height) this.y = 0
                if (this.y < 0) this.y = canvas.height
            }

            draw() {
                ctx.beginPath()
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2)
                ctx.shadowColor = this.color
                ctx.shadowBlur = 8
                ctx.fillStyle = this.color
                ctx.fill()
            }
        }

        function connect() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a + 1; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x
                    let dy = particles[a].y - particles[b].y
                    let d = Math.sqrt(dx * dx + dy * dy)
                    if (d < DIST) {
                        ctx.beginPath()
                        ctx.strokeStyle = `rgba(0,255,255,${0.5-d/(2*DIST)})`
                        ctx.moveTo(particles[a].x, particles[a].y)
                        ctx.lineTo(particles[b].x, particles[b].y)
                        ctx.stroke()
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height)
            particles.forEach(p => {
                p.update();
                p.draw()
            })
            connect()
            requestAnimationFrame(animate)
        }

        window.addEventListener("resize", init)
        init()
        animate()
    </script>

    <footer>

        <div class="footer-section">
            <h3>Marty Games</h3>
            <p>Your #1 Free Game Hub</p>
        </div>

        <div class="footer-section">
            <h4>Site</h4>
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Credits</a>
            <a href="#">DMCA</a>
        </div>

        <div class="footer-section">
            <h4>Community</h4>
            <a href="#">Community Chat</a>
        </div>

    </footer>

</body>

</html>
