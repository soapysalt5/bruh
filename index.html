<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Marty Games - Your #1 Free Game Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        a {
            text-decoration: none;
            color: inherit;
        }

        a:hover {
            text-decoration: none;
            color: inherit;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: -2;
        }

        body {
            margin: 0;
            font-family: Arial;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        .top-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            min-height: 100vh;
            text-align: center;
        }

        h2 {
            font-size: 3em;
            text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 20px #0ff;
        }

        .search-container input {
            width: 320px;
            padding: 14px 18px;
            font-size: 16px;
            border-radius: 12px;
            border: 2px solid rgba(0, 255, 255, .4);
            background: rgba(0, 0, 0, .45);
            color: white;
            outline: none;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 8px rgba(0, 255, 255, .3);
        }

        .search-container input:focus {
            border-color: #0ff;
            box-shadow: 0 0 8px #0ff, 0 0 18px #0ff;
        }

        #game-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1100px;
            margin-top: 30px;
        }

        .game-card {
            display: none;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform .3s ease, box-shadow .3s ease;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
            border: 2px solid rgba(0, 255, 255, 0.25);
        }

        .game-card:hover {
            transform: scale(1.08);
            box-shadow: 0 0 15px #0ff, 0 0 30px #0ff;
        }

        .game-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }

        .game-title {
            padding: 12px;
            text-align: center;
            font-size: 1.1em;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.6));
            text-shadow: 0 0 6px #0ff;
        }

        .meta {
            font-size: 12px;
            color: #aaa;
            padding-bottom: 12px;
            text-align: center;
        }

        footer {
            padding: 35px 0;
            display: flex;
            justify-content: center;
            gap: 80px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, .15);
            border-top: 1px solid rgba(0, 255, 255, .4);
            backdrop-filter: blur(3px);
        }

        .footer-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .footer-section a {
            color: #aaa;
        }

        .footer-section a:hover {
            color: white;
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <main>
        <div class="top-bar">
            <h2>Marty Games</h2>
            <div class="search-container">
                <input id="gameSearch" type="text" placeholder="Search Marty Games..." onkeyup="searchGames()">
            </div>

            <div id="game-list"></div>
        </div>
    </main>

    <script>
        let gamesData = [];

        fetch("games.json")
            .then(res => res.json())
            .then(data => {
                gamesData = data;
                const container = document.getElementById("game-list");

                data.forEach(game => {
                    const card = document.createElement("div");
                    card.className = "game-card";

                    card.innerHTML = `
        <a href="${game.url}">
            <img src="${game.thumbnail}">
            <div class="game-title">${game.name}</div>
        </a>
        <div class="meta">
            ID: ${game.id}<br>
            Author: ${game.author}<br>
            Engine: ${game.engine}
        </div>
        `;

                    container.appendChild(card);
                });
            });

        function searchGames() {
            let input = document.getElementById("gameSearch").value.toLowerCase();
            let games = document.getElementsByClassName("game-card");

            for (let i = 0; i < games.length; i++) {
                let title = games[i].textContent.toLowerCase();
                games[i].style.display =
                    (input.length > 0 && title.includes(input)) ? "block" : "none";
            }
        }
    </script>

    <script>
        const canvas = document.getElementById("bg-canvas"),
            ctx = canvas.getContext("2d");

        let particles = [];
        const MAX = 50;
        const DIST = 100;
        const COLORS = ['#0ff', '#ff0', '#f0f', '#0f0'];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            particles = [];
            for (let i = 0; i < MAX; i++) particles.push(new Particle());
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.vx = (Math.random() - .5) * 1.2;
                this.vy = (Math.random() - .5) * 1.2;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 8;
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function connect() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a + 1; b < particles.length; b++) {

                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let d = Math.sqrt(dx * dx + dy * dy);

                    if (d < DIST) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0,255,255,${0.5-d/(2*DIST)})`;
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            connect();

            requestAnimationFrame(animate);
        }

        window.addEventListener("resize", init);

        init();
        animate();
    </script>

    <footer>
        <div class="footer-section">
            <h4>© 2026 Marty Games</h4>
        </div>
    </footer>

</body>

</html>
