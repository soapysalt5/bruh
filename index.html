    <script>
        /* Particle background */

        const canvas = document.getElementById('bg-canvas')
        const ctx = canvas.getContext('2d')

        let particlesArray = []

        const MAX_PARTICLES = 50
        const MAX_DISTANCE = 100
        const COLORS = ['#0ff', '#ff0', '#f0f', '#0f0', '#f0ff']

        function init() {

            canvas.width = window.innerWidth
            canvas.height = window.innerHeight

            particlesArray = []

            for (let i = 0; i < MAX_PARTICLES; i++) {
                particlesArray.push(new Particle())
            }

        }

        class Particle {

            constructor() {

                this.x = Math.random() * canvas.width
                this.y = Math.random() * canvas.height
                this.size = Math.random() * 3 + 1

                this.speedX = (Math.random() - .5) * 1.2
                this.speedY = (Math.random() - .5) * 1.2

                this.color = COLORS[Math.floor(Math.random() * COLORS.length)]

            }

            update() {

                this.x += this.speedX
                this.y += this.speedY

                if (this.x > canvas.width) this.x = 0
                if (this.x < 0) this.x = canvas.width
                if (this.y > canvas.height) this.y = 0
                if (this.y < 0) this.y = canvas.height

            }

            draw() {

                ctx.beginPath()

                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2)

                ctx.shadowColor = this.color
                ctx.shadowBlur = 8

                ctx.fillStyle = this.color

                ctx.fill()

            }

        }

        function connect() {

            for (let a = 0; a < particlesArray.length; a++) {

                for (let b = a + 1; b < particlesArray.length; b++) {

                    const dx = particlesArray[a].x - particlesArray[b].x
                    const dy = particlesArray[a].y - particlesArray[b].y

                    const distance = Math.sqrt(dx * dx + dy * dy)

                    if (distance < MAX_DISTANCE) {

                        ctx.beginPath()

                        ctx.strokeStyle = `rgba(0,255,255,${0.5-distance/(2*MAX_DISTANCE)})`

                        ctx.lineWidth = 1.2

                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y)
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y)

                        ctx.stroke()

                    }

                }

            }

        }

        function animate() {

            ctx.clearRect(0, 0, canvas.width, canvas.height)

            particlesArray.forEach(p => {
                p.update()
                p.draw()
            })

            connect()

            requestAnimationFrame(animate)

        }

        window.addEventListener('resize', init)

        init()
        animate()
    </script>

    <script>
        function searchGames() {

            let input = document.getElementById("gameSearch").value.toLowerCase()

            let games = document.getElementsByClassName("game-card")

            for (let i = 0; i < games.length; i++) {

                let title = games[i].textContent.toLowerCase()

                if (input.length > 0 && title.includes(input)) {
                    games[i].style.display = "block"
                } else {
                    games[i].style.display = "none"
                }

            }

        }

        document.getElementById("gameSearch").addEventListener("keydown", function(e){

if(e.key === "Enter"){

const first = document.querySelector("#searchResults a")

if(first){
window.location = first.href
}

}

})

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<script>

let games = []
let fuse

fetch("/games.json")
.then(r => r.json())
.then(data => {

games = data

// initialize Fuse AFTER data loads
fuse = new Fuse(games,{
keys:["name","tags"],
threshold:0.35
})

})

function searchGames(){

const input = document.getElementById("gameSearch").value

const resultsBox = document.getElementById("searchResults")

resultsBox.innerHTML=""

if(!fuse) return

const results = fuse.search(input)

results.slice(0,8).forEach(result => {

const game = result.item

resultsBox.innerHTML += `
<a href="${game.url}" class="search-result">

<img src="${game.img}" class="search-thumb">

<span>${game.name}</span>

</a>
`

})

}

document.getElementById("gameSearch")
.addEventListener("input",searchGames)

</script>
