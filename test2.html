<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Marty Games</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

a{
text-decoration:none;
color:inherit;
}

#bg-canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:-2;
}

body{
margin:0;
font-family:Arial;
color:white;
min-height:100vh;
overflow-x:hidden;
display:flex;
flex-direction:column;
background:black;
}

main{
flex:1;
padding-top:120px;
}

/* TOP NAV */

.top-nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 20px;
background:rgba(0,0,0,.7);
border-bottom:1px solid rgba(0,255,255,.4);
backdrop-filter:blur(6px);
z-index:100;
}

.nav-left{
font-weight:bold;
font-size:1.2em;
text-shadow:0 0 6px #0ff;
}

.nav-center{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.nav-right{
font-weight:bold;
}

/* TITLE */

.site-title{
font-size:3em;
text-align:center;
margin-bottom:30px;
text-shadow:
0 0 5px #0ff,
0 0 10px #0ff,
0 0 20px #0ff;
}

/* CONTROLS */

input,select{
padding:10px 12px;
border-radius:10px;
border:2px solid rgba(0,255,255,.4);
background:rgba(0,0,0,.45);
color:white;
outline:none;
}

input:focus,select:focus{
border-color:#0ff;
box-shadow:0 0 10px #0ff;
}

/* GAME GRID */

#game-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
width:90%;
max-width:1100px;
margin:auto;
margin-bottom:60px;
}

.game-card{
background:rgba(0,0,0,0.6);
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:transform .3s ease, box-shadow .3s ease;
box-shadow:0 0 12px rgba(0,255,255,0.3);
border:2px solid rgba(0,255,255,0.25);
display:block;
}

.game-card:hover{
transform:scale(1.08);
box-shadow:0 0 15px #0ff,0 0 30px #0ff;
}

.game-card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
display:block;
}

.game-title{
padding:12px;
text-align:center;
font-size:1.1em;
background:linear-gradient(to top,rgba(0,0,0,0.9),rgba(0,0,0,0.6));
text-shadow:0 0 6px #0ff;
}

/* GAME VIEWER */

#gameViewer{
position:fixed;
inset:0;
background:black;
z-index:9999;
display:none;
flex-direction:column;
}

.viewer-header{
background:#000;
padding:10px;
display:flex;
gap:10px;
align-items:center;
border-bottom:1px solid rgba(0,255,255,.3);
}

.viewer-header button{
padding:6px 10px;
cursor:pointer;
}

#gameSandbox{
flex:1;
overflow:auto;
background:black;
}

/* FOOTER */

footer{
padding:35px 0;
display:flex;
justify-content:center;
gap:80px;
flex-wrap:wrap;
background:rgba(0,0,0,.15);
border-top:1px solid rgba(0,255,255,.4);
backdrop-filter:blur(3px);
}

.footer-section{
display:flex;
flex-direction:column;
gap:6px;
}

.footer-section a{
color:#aaa;
}

.footer-section a:hover{
color:white;
}

</style>

</head>

<body>

<canvas id="bg-canvas"></canvas>

<div class="top-nav">

<div class="nav-left">Marty Games</div>

<div class="nav-center">

<input id="gameSearch" placeholder="Search games">

<select id="categoryFilter">
<option value="all">All Categories</option>
<option value="action">Action</option>
<option value="driving">Driving</option>
<option value="skill">Skill</option>
<option value="shooter">Shooter</option>
<option value="puzzle">Puzzle</option>
</select>

<select id="sortSelect">
<option value="name">Sort by Name</option>
<option value="id">Sort by ID</option>
</select>

</div>

<div class="nav-right">⭐</div>

</div>

<main>

<h1 class="site-title">Marty Games</h1>

<div id="game-list"></div>

</main>

<div id="gameViewer">

<div class="viewer-header">

<button onclick="closeGame()">Close</button> <button onclick="fullscreenGame()">Fullscreen</button> <button onclick="openNewTab()">New Tab</button>

<span id="gameTitle"></span>

</div>

<div id="gameSandbox"></div>

</div>

<footer>
<div class="footer-section">
<h4>© 2026 Marty Games</h4>
</div>
</footer>

<script>

let gamesData=[];

fetch("games.json")
.then(r=>r.json())
.then(data=>{
gamesData=data;
sortGames();
filterGames();
loadFromURL();
})
.catch(()=>{
document.getElementById("game-list").innerHTML="Failed to load games.";
});

function renderGames(games){

const container=document.getElementById("game-list");
container.innerHTML="";

if(!games.length){
container.innerHTML="<p>No games found</p>";
return;
}

games.forEach(game=>{

const card=document.createElement("div");
card.className="game-card";

card.innerHTML=`
<img src="${game.thumbnail}" loading="lazy">
<div class="game-title">${game.name}</div>
`;

card.onclick=()=>openGame(game);

container.appendChild(card);

});

}

function filterGames(){

const search=document.getElementById("gameSearch").value.toLowerCase();
const category=document.getElementById("categoryFilter").value;

let filtered=gamesData.filter(game=>{

const nameMatch=game.name.toLowerCase().includes(search);
const idMatch=(game.id+"").includes(search);
const categoryMatch=category==="all" || game.category===category;

return (nameMatch||idMatch)&&categoryMatch;

});

renderGames(filtered);

}

function sortGames(){

const type=document.getElementById("sortSelect").value;

if(type==="name") gamesData.sort((a,b)=>a.name.localeCompare(b.name));
if(type==="id") gamesData.sort((a,b)=>a.id-b.id);

filterGames();

}

async function openGame(game){

document.getElementById("gameViewer").style.display="flex";
document.getElementById("gameTitle").textContent=game.name;

const sandbox=document.getElementById("gameSandbox");
sandbox.innerHTML="Loading...";

try{

const res=await fetch(game.url);
let html=await res.text();

const base=game.url.substring(0,game.url.lastIndexOf("/")+1);

html=html.replace(/(src|href)=["'](?!https?:\/\/|\/)/g,`$1="${base}`);

sandbox.innerHTML=html;

sandbox.querySelectorAll("script").forEach(oldScript=>{

const newScript=document.createElement("script");

if(oldScript.src){
newScript.src=oldScript.src;
}else{
newScript.textContent=oldScript.textContent;
}

document.body.appendChild(newScript);
oldScript.remove();

});

}catch(e){

sandbox.innerHTML="Failed to load game.";

}

const url=new URL(window.location);
url.searchParams.set("id",game.id);
history.pushState(null,"",url);

}

function closeGame(){

document.getElementById("gameViewer").style.display="none";
document.getElementById("gameSandbox").innerHTML="";

const url=new URL(window.location);
url.searchParams.delete("id");
history.pushState(null,"",url);

}

function fullscreenGame(){

const sandbox=document.getElementById("gameSandbox");

if(sandbox.requestFullscreen) sandbox.requestFullscreen();

}

function openNewTab(){

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

const game=gamesData.find(g=>g.id==id);

if(game) window.open(game.url,"_blank");

}

function loadFromURL(){

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

if(!id) return;

const game=gamesData.find(g=>g.id==id);

if(game) openGame(game);

}

document.getElementById("gameSearch").addEventListener("input",filterGames);
document.getElementById("categoryFilter").addEventListener("change",filterGames);
document.getElementById("sortSelect").addEventListener("change",sortGames);

</script>

<script>

const canvas=document.getElementById("bg-canvas"),
ctx=canvas.getContext("2d");

let particles=[];
const MAX=window.innerWidth<600?25:50;
const DIST=100;
const COLORS=['#0ff','#ff0','#f0f','#0f0'];

function init(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

particles=[];

for(let i=0;i<MAX;i++) particles.push(new Particle());

}

class Particle{

constructor(){

this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.size=Math.random()*3+1;
this.vx=(Math.random()-.5)*1.2;
this.vy=(Math.random()-.5)*1.2;
this.color=COLORS[Math.floor(Math.random()*COLORS.length)];

}

update(){

this.x+=this.vx;
this.y+=this.vy;

if(this.x>canvas.width) this.x=0;
if(this.x<0) this.x=canvas.width;

if(this.y>canvas.height) this.y=0;
if(this.y<0) this.y=canvas.height;

}

draw(){

ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.shadowColor=this.color;
ctx.shadowBlur=8;
ctx.fillStyle=this.color;
ctx.fill();

}

}

function connect(){

for(let a=0;a<particles.length;a++){

for(let b=a+1;b<particles.length;b++){

let dx=particles[a].x-particles[b].x;
let dy=particles[a].y-particles[b].y;
let d=Math.sqrt(dx*dx+dy*dy);

if(d<DIST){

ctx.beginPath();
ctx.strokeStyle=`rgba(0,255,255,${0.5-d/(2*DIST)})`;
ctx.moveTo(particles[a].x,particles[a].y);
ctx.lineTo(particles[b].x,particles[b].y);
ctx.stroke();

}

}

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.update();
p.draw();
});

connect();

requestAnimationFrame(animate);

}

window.addEventListener("resize",init);

init();
animate();

</script>

</body>
</html>
